<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>getprints</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>getprints</h1>
    <div class="server-status">
      <span class="status-dot" id="statusDot"></span>
      <span class="status-text" id="statusText">Wird geprüft…</span>
      <button class="btn-icon" id="refreshBtn" title="Drucker aktualisieren">↺</button>
    </div>
  </header>

  <main>
    <div class="drop-panel">
      <div class="drop-zone" id="dropZone">
        <div class="drop-hint" id="dropHint">
          <div class="drop-icon">↓</div>
          <p>PDF oder Bild ablegen</p>
          <p class="drop-sub">oder klicken zum Auswählen</p>
        </div>
        <iframe id="pdfPreview" class="preview hidden" title="PDF-Vorschau"></iframe>
        <img id="imgPreview" class="preview hidden" alt="Vorschau">
      </div>
      <div class="file-bar hidden" id="fileBar">
        <span id="fileName"></span>
        <button class="btn-clear" id="clearFile" title="Datei entfernen">✕</button>
      </div>
      <input type="file" id="fileInput" accept=".pdf,image/*" hidden>
    </div>

    <div class="text-panel">
      <label for="textInput">Oder Text zum Drucken eingeben</label>
      <textarea id="textInput" rows="5" placeholder="Kurzer Text, Etikett, Notiz…"></textarea>
      <div class="toggle-group">
        <button type="button" class="btn-toggle" id="toggleCode128" data-mode="code128">Code128</button>
        <button type="button" class="btn-toggle" id="toggleQrcode" data-mode="qrcode">QR-Code</button>
      </div>
    </div>

    <div class="controls-panel">
      <div class="field">
        <label for="printerSelect">Drucker</label>
        <select id="printerSelect">
          <option value="">— Drucker wählen —</option>
        </select>
        <span id="printerMedia"></span>
      </div>

      <div class="field">
        <label for="copies">Kopien</label>
        <input type="number" id="copies" value="1" min="1" max="99">
      </div>

      <div class="field">
        <label for="pages">Seiten</label>
        <input type="text" id="pages" placeholder="alle">
        <span class="hint">z. B. 1-3,5</span>
      </div>

      <div class="field">
        <label>Ausrichtung</label>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="orientation" value="portrait" checked> Hochformat
          </label>
          <label class="radio-label">
            <input type="radio" name="orientation" value="landscape"> Querformat
          </label>
        </div>
      </div>

      <div class="field">
        <label>Skalierung</label>
        <div class="radio-group">
          <label class="radio-label">
            <input type="radio" name="scale" value="none" checked> 100%
          </label>
          <label class="radio-label">
            <input type="radio" name="scale" value="fit"> An Seite anpassen
          </label>
        </div>
      </div>

      <div class="controls-footer">
        <button class="btn-cancel" id="cancelBtn" disabled>Abbrechen</button>
        <button class="btn-print" id="printBtn" disabled>Drucken</button>
        <div class="print-status hidden" id="printStatus"></div>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
